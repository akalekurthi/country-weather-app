<mat-toolbar color="primary" class="app-toolbar">
  <div class="toolbar-inner">
    <a class="app-brand" routerLink="/">
      <mat-icon aria-hidden="true" class="brand-mark">public</mat-icon>
      <span class="brand-title">{{ title() }}</span>
    </a>

    <span class="spacer"></span>

    <button mat-icon-button type="button" (click)="darkMode.set(!darkMode())" aria-label="Toggle theme">
      <mat-icon>{{ themeIcon() }}</mat-icon>
    </button>
  </div>
</mat-toolbar>

<div class="app-wrap">
  <div class="app-content">
    <router-outlet />
  </div>
</div>
